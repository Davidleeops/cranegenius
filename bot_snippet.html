<style>
.bot-trigger{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:1000;background:#F5A623;color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;writing-mode:vertical-rl;padding:16px 10px;cursor:pointer;border:none;border-radius:4px 0 0 4px;transition:all .2s;box-shadow:-4px 0 20px rgba(245,166,35,.3)}
.bot-trigger:hover{background:#ffb83f}
.bot-trigger.open{right:380px}
.bot-panel{position:fixed;top:0;right:-400px;width:380px;height:100vh;background:#141824;border-left:1px solid #2E3650;z-index:999;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.6)}
.bot-panel.open{right:0}
.bot-head{padding:16px 18px;border-bottom:1px solid #252D45;background:#1A1F2E;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.bot-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:#F5A623}
.bot-sub{font-size:10px;color:#5A6480;margin-top:3px;font-family:'Share Tech Mono',monospace;letter-spacing:1px}
.bot-x{background:none;border:none;color:#5A6480;font-size:18px;cursor:pointer;padding:4px}
.bot-x:hover{color:#C8D0E0}
.bsteps{display:flex;padding:10px 18px;border-bottom:1px solid #252D45;background:rgba(0,0,0,.2)}
.bs{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;position:relative}
.bs:not(:last-child)::after{content:'';position:absolute;top:9px;left:60%;width:80%;height:1px;background:#252D45}
.bs-dot{width:18px;height:18px;border-radius:50%;background:#252D45;border:1px solid #2E3650;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#5A6480;transition:all .3s;z-index:1;position:relative;font-family:'Share Tech Mono',monospace}
.bs.done .bs-dot{background:#00C4A7;border-color:#00C4A7;color:#000}
.bs.active .bs-dot{background:#F5A623;border-color:#F5A623;color:#000}
.bs-lbl{font-size:9px;color:#5A6480;font-family:'Share Tech Mono',monospace;letter-spacing:.5px;text-transform:uppercase}
.bs.active .bs-lbl{color:#F5A623}
.bs.done .bs-lbl{color:#00C4A7}
.bmsgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:#252D45 transparent}
.bm{max-width:88%;animation:bfu .2s ease}
.bm-b{align-self:flex-start}
.bm-u{align-self:flex-end}
.bb{padding:9px 12px;border-radius:6px;font-size:13px;line-height:1.5;white-space:pre-wrap}
.bm-b .bb{background:#1A1F2E;border:1px solid #2E3650;border-bottom-left-radius:2px;color:#C8D0E0}
.bm-u .bb{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);border-bottom-right-radius:2px;color:#C8D0E0}
.bl{font-size:10px;color:#5A6480;margin-bottom:4px;font-family:'Share Tech Mono',monospace;letter-spacing:1px}
.bm-u .bl{text-align:right}
.bdots{display:flex;gap:4px;padding:9px 12px;background:#1A1F2E;border:1px solid #2E3650;border-radius:6px;border-bottom-left-radius:2px;width:fit-content}
.bdots span{width:5px;height:5px;background:#5A6480;border-radius:50%;animation:bbo .8s infinite}
.bdots span:nth-child(2){animation-delay:.15s}
.bdots span:nth-child(3){animation-delay:.3s}
@keyframes bbo{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@keyframes bfu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bqrs{display:flex;flex-wrap:wrap;gap:6px;padding:0 18px 10px}
.bqr{padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid rgba(245,166,35,.35);background:rgba(245,166,35,.07);color:#F5A623;transition:all .15s;font-family:'Barlow',sans-serif;font-weight:600}
.bqr:hover{background:rgba(245,166,35,.18)}
.bin-row{padding:12px 18px;border-top:1px solid #252D45;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.bin{flex:1;background:#1A1F2E;border:1px solid #2E3650;border-radius:4px;padding:9px 12px;color:#C8D0E0;font-family:'Barlow',sans-serif;font-size:13px;outline:none;resize:none;max-height:80px;transition:border-color .15s;line-height:1.4}
.bin:focus{border-color:#F5A623}
.bin::placeholder{color:#5A6480}
.bsend{width:34px;height:34px;border-radius:4px;background:#F5A623;border:none;cursor:pointer;font-size:14px;transition:all .15s;flex-shrink:0;color:#000;font-weight:700}
.bsend:hover{background:#ffb83f}
.bsend:disabled{background:#252D45;cursor:not-allowed;color:#5A6480}
.bprev{background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(245,166,35,.04));border:1px solid rgba(245,166,35,.3);border-radius:6px;padding:12px;margin-top:6px}
.bprev-t{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;color:#F5A623;margin-bottom:8px;text-transform:uppercase}
.bprev-g{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.bpl{font-size:10px;color:#5A6480;text-transform:uppercase;font-family:'Share Tech Mono',monospace}
.bpv{font-size:12px;font-weight:600;color:#C8D0E0}
.bpub{background:#F5A623;color:#000;border:none;padding:7px 16px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-right:8px}
.bpub:hover{background:#ffb83f}
.bedit{background:transparent;color:#C8D0E0;border:1px solid #2E3650;padding:7px 14px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;cursor:pointer}
.bedit:hover{border-color:#F5A623;color:#F5A623}
</style>
<button class="bot-trigger" id="botTrig" onclick="toggleBot()">
  <span style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <span style="font-size:16px;writing-mode:horizontal-tb">🤖</span>
    <span>LIST YOUR CRANE</span>
  </span>
</button>
<div class="bot-panel" id="botPanel">
  <div class="bot-head">
    <div>
      <div class="bot-title">🤖 AI LISTING ASSISTANT</div>
      <div class="bot-sub">ANSWER MY QUESTIONS — GO LIVE IN 2 MIN</div>
    </div>
    <button class="bot-x" onclick="toggleBot()">✕</button>
  </div>
  <div class="bsteps">
    <div class="bs active" id="bs0"><div class="bs-dot">1</div><div class="bs-lbl">Start</div></div>
    <div class="bs" id="bs1"><div class="bs-dot">2</div><div class="bs-lbl">Equip</div></div>
    <div class="bs" id="bs2"><div class="bs-dot">3</div><div class="bs-lbl">Specs</div></div>
    <div class="bs" id="bs3"><div class="bs-dot">4</div><div class="bs-lbl">Price</div></div>
    <div class="bs" id="bs4"><div class="bs-dot">5</div><div class="bs-lbl">Contact</div></div>
    <div class="bs" id="bs5"><div class="bs-dot">✓</div><div class="bs-lbl">Live</div></div>
  </div>
  <div class="bmsgs" id="bmsgs"></div>
  <div class="bqrs" id="bqrs"></div>
  <div class="bin-row">
    <textarea class="bin" id="bin" placeholder="Type your answer..." rows="1" onkeydown="bkey(event)" oninput="bresize(this)"></textarea>
    <button class="bsend" id="bsend" onclick="bgo()">→</button>
  </div>
</div>
<script>
var bopen=false,bwait=false,bhist=[];
var BSYS="You are CraneGenius AI helping crane owners list equipment. Be brief and friendly. Collect in order: 1)company name 2)model/make 3)type(Tower Crane,Mobile Crane,Crawler Crane,Rough Terrain,All Terrain,Boom Truck) 4)capacity tons 5)boom feet 6)year 7)daily rate dollars 8)location city and state 9)email 10)notes. Ask ONE question at a time, 1-2 sentences max. When you have all 10 fields output only: LISTING_READY:{companyfield,modelfield,typefield,capfield,boomfield,yearfield,ratefield,locfield,emailfield,tagsfield,notesfield} using proper JSON.";
function toggleBot(){bopen=!bopen;document.getElementById("botPanel").classList.toggle("open",bopen);document.getElementById("botTrig").classList.toggle("open",bopen);if(bopen&&bhist.length===0){setTimeout(function(){baddmsg("bot","Hey! I will get your crane listed in 2 minutes. What is the name of your company?",false);},300);}if(bopen)document.getElementById("bin").focus();}
async function bai(msg){bhist.push({role:"user",content:msg});try{var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:BSYS,messages:bhist})});var d=await r.json();var t=d.content&&d.content[0]?d.content[0].text:"Sorry try again.";bhist.push({role:"assistant",content:t});return t;}catch(e){return "Connection error.";}}
function bparse(text){var m=text.match(/LISTING_READY:({[\s\S]*?})/);if(m){try{return JSON.parse(m[1]);}catch(e){}}return null;}
function bsetstep(n){for(var i=0;i<=5;i++){var el=document.getElementById("bs"+i);if(!el)continue;el.classList.remove("active","done");if(i<n)el.classList.add("done");else if(i===n)el.classList.add("active");}}
function bguessstep(t){var tl=t.toLowerCase();if(tl.includes("company"))bsetstep(1);else if(tl.includes("model")||tl.includes("make"))bsetstep(1);else if(tl.includes("type")||tl.includes("tower"))bsetstep(2);else if(tl.includes("capacity")||tl.includes("boom")||tl.includes("year"))bsetstep(2);else if(tl.includes("rate")||tl.includes("price"))bsetstep(3);else if(tl.includes("location")||tl.includes("city"))bsetstep(3);else if(tl.includes("email")||tl.includes("contact"))bsetstep(4);else if(tl.includes("note")||tl.includes("feature"))bsetstep(4);}
function baddmsg(role,text,typing){return new Promise(async function(res){var area=document.getElementById("bmsgs");if(typing){var td=document.createElement("div");td.className="bm bm-b";td.id="btyp";td.innerHTML="<div class=\"bdots\"><span></span><span></span><span></span></div>";area.appendChild(td);area.scrollTop=area.scrollHeight;await new Promise(function(r){setTimeout(r,700);});td.remove();}var listing=bparse(text);var clean=text.replace(/LISTING_READY:{[\s\S]*?}/,"").trim();var el=document.createElement("div");el.className="bm bm-"+role;if(listing&&role==="bot"){var pg="<div class=\"bprev-g\">";pg+="<div><div class=\"bpl\">Type</div><div class=\"bpv\">"+be(listing.type)+"</div></div>";pg+="<div><div class=\"bpl\">Capacity</div><div class=\"bpv\">"+listing.cap+"t</div></div>";pg+="<div><div class=\"bpl\">Boom</div><div class=\"bpv\">"+listing.boom+"ft</div></div>";pg+="<div><div class=\"bpl\">Year</div><div class=\"bpv\">"+listing.year+"</div></div>";pg+="<div><div class=\"bpl\">Rate</div><div class=\"bpv\" style=\"color:#F5A623\">$"+((listing.rate||0).toLocaleString())+"/day</div></div>";pg+="<div><div class=\"bpl\">Location</div><div class=\"bpv\">"+be(listing.loc)+"</div></div></div>";var ld=JSON.stringify(listing);el.innerHTML="<div class=\"bl\">CRANE GENIUS</div><div class=\"bb\">"+be(clean||"Here is your listing preview")+"</div><div class=\"bprev\"><div class=\"bprev-t\">"+be(listing.company)+" — "+be(listing.model)+"</div>"+pg+"<div style=\"margin-top:8px\"><button class=\"bpub\" onclick=\"bpublish(this)\">PUBLISH NOW</button><button class=\"bedit\" onclick=\"baddmsg('bot','What would you like to change?',false)\">EDIT</button></div></div>";el.querySelector(".bpub").dataset.listing=ld;bsetstep(5);}else if(role==="bot"){el.innerHTML="<div class=\"bl\">CRANE GENIUS</div><div class=\"bb\">"+be(clean)+"</div>";bguessstep(clean);}else{el.innerHTML="<div class=\"bl\" style=\"text-align:right\">YOU</div><div class=\"bb\">"+be(text)+"</div>";}area.appendChild(el);area.scrollTop=area.scrollHeight;res();});}
function bsetqr(opts){document.getElementById("bqrs").innerHTML=opts.map(function(o){return "<button class=\"bqr\" onclick=\"bqrc('"+o+"')\">"+o+"</button>";}).join("");}
function bclearqr(){document.getElementById("bqrs").innerHTML="";}
function bqrc(t){bclearqr();document.getElementById("bin").value=t;bgo();}
async function bgo(){if(bwait)return;var inp=document.getElementById("bin");var msg=inp.value.trim();if(!msg)return;inp.value="";bresize(inp);bclearqr();await baddmsg("user",msg,false);bwait=true;document.getElementById("bsend").disabled=true;var resp=await bai(msg);await baddmsg("bot",resp,true);var low=resp.toLowerCase();if(low.includes("type")&&(low.includes("crane")||low.includes("terrain")))bsetqr(["Tower Crane","Mobile Crane","Crawler Crane","All Terrain","Rough Terrain","Boom Truck"]);bwait=false;document.getElementById("bsend").disabled=false;document.getElementById("bin").focus();}
function bkey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();bgo();}}
function bresize(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,80)+"px";}
function bpublish(btn){var d=JSON.parse(btn.dataset.listing);var item={id:Date.now(),company:d.company||"Unknown",model:d.model||"Unknown",type:d.type||"Mobile Crane",cap:parseFloat(d.cap)||0,boom:parseFloat(d.boom)||0,year:parseInt(d.year)||2020,rate:parseFloat(d.rate)||0,loc:d.loc||"Unknown",email:d.email||""};console.log("PUBLISHED:",item);setTimeout(function(){baddmsg("bot","Your "+item.model+" is live! Companies in "+item.loc+" can now find you. Want to list another crane?",false);bsetqr(["Yes list another","No I am done","How do I get leads"]);bhist=[];bsetstep(0);},400);}
function be(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
</script>
